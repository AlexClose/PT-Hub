<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0f;--surface:#161618;--surface2:#1e1e21;--border:rgba(255,255,255,0.07);--text:#f0ede8;--muted:rgba(240,237,232,0.4);--accent:#e8ff47;--accent2:#47c4ff;--danger:#ff5c5c;--warn:#ffad47;--success:#47ffb0;--radius:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(14,14,15,0.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;height:56px;padding:0 12px;gap:4px;}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--accent);margin-right:auto;}
.nav-tab{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:7px 10px;border-radius:8px;cursor:pointer;color:var(--muted);border:none;background:none;transition:all .18s;}
.nav-tab:hover{color:var(--text);background:var(--surface);}
.nav-tab.active{color:var(--bg);background:var(--accent);}
main{padding-top:56px;}
.view{display:none;padding:20px 16px 80px;max-width:720px;margin:0 auto;}
.view.active{display:block;}
h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px;}
.label{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.muted{color:var(--muted);font-size:13px;}
.badge{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap;}
.badge-green{background:rgba(71,255,176,0.12);color:var(--success);}
.badge-yellow{background:rgba(255,173,71,0.12);color:var(--warn);}
.badge-red{background:rgba(255,92,92,0.12);color:var(--danger);}
.badge-blue{background:rgba(71,196,255,0.12);color:var(--accent2);}
.badge-summer{background:rgba(255,173,71,0.15);color:#ffcf47;}
.btn{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;letter-spacing:.5px;padding:10px 18px;border-radius:9px;cursor:pointer;border:none;transition:all .18s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:var(--bg);}
.btn-primary:hover{opacity:.88;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:rgba(255,255,255,0.18);}
.btn-danger{background:rgba(255,92,92,0.1);color:var(--danger);border:1px solid rgba(255,92,92,0.2);}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-full{width:100%;justify-content:center;}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;padding:10px 12px;width:100%;transition:border-color .15s;outline:none;}
input:focus,select:focus,textarea:focus{border-color:rgba(232,255,71,0.4);}
select option{background:var(--surface2);}
textarea{resize:vertical;min-height:60px;}
.form-group{margin-bottom:12px;}
.form-label{font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.alert{border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px;}
.alert-warn{background:rgba(255,173,71,0.08);border:1px solid rgba(255,173,71,0.2);}
.alert-danger{background:rgba(255,92,92,0.08);border:1px solid rgba(255,92,92,0.2);}
.prog-wrap{background:var(--surface2);border-radius:20px;height:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:20px;transition:width .4s;}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .18s;}
.client-card:hover{border-color:rgba(255,255,255,0.16);}
.client-avatar{width:38px;height:38px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;flex-shrink:0;color:var(--accent);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.stat-num{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1;}
.stat-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:16px;}
.equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.equip-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;display:flex;align-items:center;justify-content:space-between;}
.equip-item .remove{color:var(--danger);cursor:pointer;font-size:18px;line-height:1;}
.prog-day-block{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.prog-day-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.prog-day-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.prog-day-body{display:none;}
.prog-day-body.open{display:block;}
.ex-row{padding:12px 14px;border-top:1px solid var(--border);}
.ex-name{font-size:14px;font-weight:500;margin-bottom:2px;}
.ex-prescription{font-size:12px;color:var(--accent);margin-bottom:4px;}
.ex-last{font-size:11px;color:var(--muted);background:rgba(255,255,255,0.04);border-radius:6px;padding:4px 8px;display:inline-block;margin-top:2px;}
.ex-last.has-data{color:var(--accent2);background:rgba(71,196,255,0.06);}
.workout-ex-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
.workout-ex-name{font-size:13px;font-weight:500;margin-bottom:2px;}
.workout-inputs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.workout-inputs input{font-size:13px;padding:8px 10px;text-align:center;}
.wi-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;margin-top:2px;}
.ss-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--warn);margin-bottom:6px;margin-top:4px;}
.loading{text-align:center;padding:40px 20px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-output{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;}
.ai-thinking{color:var(--muted);font-style:italic;}
.cursor-blink{animation:blink .8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;z-index:300;transition:transform .3s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">PT HUB</div>
  <button class="nav-tab active" onclick="showView('dashboard',this)">Dashboard</button>
  <button class="nav-tab" onclick="showView('clients',this)">Clients</button>
  <button class="nav-tab" onclick="showView('equipment',this)">Equipment</button>
</nav>
<main>
  <div class="view active" id="view-dashboard">
    <div style="margin-bottom:20px"><div class="label">Overview</div><h2>Your Business</h2></div>
    <div class="stats-grid" id="dashStats"></div>
    <div id="dashAlerts"></div>
    <div class="label" style="margin-bottom:10px">All Clients</div>
    <div id="dashClients"></div>
  </div>
  <div class="view" id="view-clients">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div><div class="label">Roster</div><h2>Clients</h2></div>
      <button class="btn btn-primary" onclick="openAddClient()">+ Add</button>
    </div>
    <input type="text" placeholder="Search clients..." id="clientSearch" oninput="renderClientList()" style="margin-bottom:14px">
    <div id="clientList"></div>
  </div>
  <div class="view" id="view-equipment">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div><div class="label">Gym Setup</div><h2>Equipment</h2></div>
      <button class="btn btn-primary" onclick="openAddEquip()">+ Add</button>
    </div>
    <p class="muted" style="margin-bottom:12px">Used when generating AI programs.</p>
    <div class="equip-grid" id="equipList"></div>
  </div>
</main>

<div class="modal-overlay" id="clientModal"><div class="modal" id="clientModalBody"></div></div>

<div class="modal-overlay" id="addClientModal">
  <div class="modal">
    <div class="modal-handle"></div><div class="modal-title">New Client</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">First Name</label><input id="acFirst" placeholder="First"></div>
      <div class="form-group"><label class="form-label">Last Name</label><input id="acLast" placeholder="Last"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Age</label><input id="acAge" type="number"></div>
      <div class="form-group"><label class="form-label">Level</label><select id="acLevel"><option value="Beginner">Beginner</option><option value="Intermediate" selected>Intermediate</option><option value="Advanced">Advanced</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Package Size</label><select id="acPackage"><option value="0">TBD</option><option value="5">5</option><option value="10">10</option><option value="15">15</option><option value="20">20</option><option value="25">25</option><option value="30">30</option></select></div>
      <div class="form-group"><label class="form-label">Remaining</label><input id="acRemaining" type="number" placeholder="0"></div>
    </div>
    <div class="form-group"><label class="form-label">Schedule</label><input id="acSchedule"></div>
    <div class="form-group"><label class="form-label">Session Length</label><select id="acDuration"><option value="60">60 min</option><option value="30">30 min</option><option value="45">45 min</option><option value="90">90 min</option></select></div>
    <div class="form-group"><label class="form-label">Goals</label><input id="acGoals"></div>
    <div class="form-group"><label class="form-label">Injuries</label><input id="acInjuries"></div>
    <div class="form-group"><label class="form-label">Notes</label><textarea id="acNotes"></textarea></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-secondary btn-full" onclick="closeModal('addClientModal')">Cancel</button>
      <button class="btn btn-primary btn-full" onclick="saveClient()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editClientModal">
  <div class="modal">
    <div class="modal-handle"></div><div class="modal-title">Edit Client</div>
    <input type="hidden" id="ecId">
    <div class="form-row">
      <div class="form-group"><label class="form-label">First Name</label><input id="ecFirst"></div>
      <div class="form-group"><label class="form-label">Last Name</label><input id="ecLast"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Age</label><input id="ecAge" type="number"></div>
      <div class="form-group"><label class="form-label">Level</label><select id="ecLevel"><option value="Beginner">Beginner</option><option value="Intermediate">Intermediate</option><option value="Advanced">Advanced</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Package Size</label><select id="ecPackage"><option value="0">TBD</option><option value="5">5</option><option value="10">10</option><option value="15">15</option><option value="20">20</option><option value="25">25</option><option value="30">30</option></select></div>
      <div class="form-group"><label class="form-label">Remaining</label><input id="ecRemaining" type="number"></div>
    </div>
    <div class="form-group"><label class="form-label">Schedule</label><input id="ecSchedule"></div>
    <div class="form-group"><label class="form-label">Session Length</label><select id="ecDuration"><option value="60">60 min</option><option value="30">30 min</option><option value="45">45 min</option><option value="90">90 min</option></select></div>
    <div class="form-group"><label class="form-label">Goals</label><input id="ecGoals"></div>
    <div class="form-group"><label class="form-label">Injuries</label><input id="ecInjuries"></div>
    <div class="form-group"><label class="form-label">Notes</label><textarea id="ecNotes"></textarea></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-secondary btn-full" onclick="closeModal('editClientModal')">Cancel</button>
      <button class="btn btn-primary btn-full" onclick="saveEditClient()">Save Changes</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addEquipModal">
  <div class="modal">
    <div class="modal-handle"></div><div class="modal-title">Add Equipment</div>
    <div class="form-group"><label class="form-label">Name</label><input id="equipName" placeholder="e.g. Cable Machine, Leg Press..."></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-secondary btn-full" onclick="closeModal('addEquipModal')">Cancel</button>
      <button class="btn btn-primary btn-full" onclick="saveEquip()">Add</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="logModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="logModalTitle">Log Session</div>
    <div id="logWorkoutSection"></div>
    <div class="form-group" style="margin-top:8px"><label class="form-label">General Note (optional)</label><textarea id="logNote" placeholder="e.g. Great energy, worked on form..."></textarea></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-secondary btn-full" onclick="closeModal('logModal')">Cancel</button>
      <button class="btn btn-primary btn-full" onclick="confirmLogSession()">✓ Mark Complete</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="renewModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="renewTitle">Renew Package</div>
    <div class="form-group"><label class="form-label">New Package Size</label><select id="renewPkg"><option value="5">5</option><option value="10" selected>10</option><option value="15">15</option><option value="20">20</option><option value="25">25</option><option value="30">30</option></select></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-secondary btn-full" onclick="closeModal('renewModal')">Cancel</button>
      <button class="btn btn-primary btn-full" onclick="confirmRenew()">Renew</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://oneykldgivaqcrqmrqha.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uZXlrbGRnaXZhcWNycW1ycWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTQ4NTYsImV4cCI6MjA5MzU3MDg1Nn0.Os-XjWM6nJuFOLLQhBUH0DUL40So-jkpXGx9iBequyw';
const H = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function sb(method, table, body=null, params='') {
  const res = await fetch(`${SB_URL}/rest/v1/${table}${params}`, { method, headers: H, body: body ? JSON.stringify(body) : null });
  if (!res.ok) throw new Error(await res.text());
  const t = await res.text(); return t ? JSON.parse(t) : [];
}

const db = {
  getClients:    ()        => sb('GET',    'clients',       null, '?order=first.asc'),
  addClient:     (d)       => sb('POST',   'clients',       d),
  updateClient:  (id, d)   => sb('PATCH',  'clients',       d,   `?id=eq.${id}`),
  deleteClient:  (id)      => sb('DELETE', 'clients',       null,`?id=eq.${id}`),
  getSessions:   (cid)     => sb('GET',    'sessions',      null,`?client_id=eq.${cid}&order=created_at.desc`),
  addSession:    (d)       => sb('POST',   'sessions',      d),
  getEquipment:  ()        => sb('GET',    'equipment',     null,'?order=name.asc'),
  addEquipment:  (name)    => sb('POST',   'equipment',     {name}),
  delEquipment:  (id)      => sb('DELETE', 'equipment',     null,`?id=eq.${id}`),
  addExLog:      (d)       => sb('POST',   'exercise_logs', d),
  getExLogs:     (cid)     => sb('GET',    'exercise_logs', null,`?client_id=eq.${cid}&order=created_at.asc`),
};

let clients=[], equipment=[], pendingLogId=null, pendingRenewId=null;

async function init() {
  showLoading('dashClients');
  try {
    [clients, equipment] = await Promise.all([db.getClients(), db.getEquipment()]);
    renderDashboard();
  } catch(e) {
    document.getElementById('dashClients').innerHTML=`<div class="alert alert-danger"><span>⚠️</span><div>Could not connect to database.</div></div>`;
  }
}

function showLoading(id){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="loading"><div class="spinner"></div><div>Loading...</div></div>`;}
function showView(name,el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(el)el.classList.add('active');
  if(name==='dashboard')renderDashboard();
  if(name==='clients')renderClientList();
  if(name==='equipment')renderEquipList();
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

function renderDashboard(){
  const withPkg=clients.filter(c=>c.package_size>0);
  const low=withPkg.filter(c=>c.remaining>0&&c.remaining<=2);
  const out=withPkg.filter(c=>c.remaining<=0);
  document.getElementById('dashStats').innerHTML=`
    <div class="stat-card"><div class="stat-num">${clients.length}</div><div class="stat-label">Clients</div></div>
    <div class="stat-card"><div class="stat-num">${clients.reduce((a,c)=>a+(c.session_count||0),0)}</div><div class="stat-label">Sessions Logged</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${low.length}</div><div class="stat-label">Low Sessions</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--danger)">${out.length}</div><div class="stat-label">Invoice Needed</div></div>`;
  let alerts='';
  out.forEach(c=>{alerts+=`<div class="alert alert-danger"><span>⚠️</span><div><b>${c.first} ${c.last}</b> is out of sessions — invoice via Square</div></div>`;});
  low.forEach(c=>{alerts+=`<div class="alert alert-warn"><span>🔔</span><div><b>${c.first} ${c.last}</b> has ${c.remaining} session${c.remaining===1?'':'s'} left</div></div>`;});
  document.getElementById('dashAlerts').innerHTML=alerts;
  const sorted=[...clients].sort((a,b)=>{if(a.package_size===0&&b.package_size===0)return 0;if(a.package_size===0)return 1;if(b.package_size===0)return -1;return a.remaining-b.remaining;});
  document.getElementById('dashClients').innerHTML=clients.length===0?`<div class="empty"><div class="empty-icon">👤</div>No clients yet</div>`:sorted.map(clientRowHtml).join('');
}

function clientRowHtml(c){
  const hasPkg=c.package_size>0;
  const pct=hasPkg?Math.max(0,c.remaining/c.package_size*100):0;
  const col=!hasPkg?'var(--muted)':c.remaining<=0?'var(--danger)':c.remaining<=2?'var(--warn)':'var(--success)';
  const badge=!hasPkg?'<span class="badge badge-blue">No pkg</span>':c.remaining<=0?'<span class="badge badge-red">OUT</span>':c.remaining<=2?`<span class="badge badge-yellow">${c.remaining} left</span>`:`<span class="badge badge-green">${c.remaining} left</span>`;
  const isSummer=c.first.toLowerCase().includes('summer');
  return `<div class="client-card" onclick="openClientDetail('${c.id}')">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:${hasPkg?'10':'0'}px">
      <div class="client-avatar">${c.first[0]}${c.last?c.last[0]:''}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-weight:500;font-size:15px">${c.first} ${c.last}</span>
          ${isSummer?'<span class="badge badge-summer" style="font-size:9px">☀️</span>':''}
          ${c.structured_program?'<span class="badge badge-blue" style="font-size:9px">📋</span>':''}
        </div>
        <div class="muted" style="font-size:12px">${c.schedule||'No schedule'}</div>
      </div>
      ${badge}
    </div>
    ${hasPkg?`<div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>`:''}
  </div>`;
}

function renderClientList(){
  const q=(document.getElementById('clientSearch')?.value||'').toLowerCase();
  const filtered=clients.filter(c=>`${c.first} ${c.last}`.toLowerCase().includes(q));
  document.getElementById('clientList').innerHTML=filtered.length===0?`<div class="empty"><div class="empty-icon">👤</div>${clients.length===0?'No clients yet':'No results'}</div>`:filtered.map(clientRowHtml).join('');
}

function openAddClient(){
  ['acFirst','acLast','acAge','acGoals','acInjuries','acNotes','acSchedule'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('acLevel').value='Intermediate';document.getElementById('acPackage').value='0';
  document.getElementById('acRemaining').value='';document.getElementById('acDuration').value='60';
  openModal('addClientModal');
}
async function saveClient(){
  const first=document.getElementById('acFirst').value.trim();if(!first){toast('Enter a name');return;}
  const pkg=parseInt(document.getElementById('acPackage').value)||0;
  try{
    const created=await db.addClient({first,last:document.getElementById('acLast').value.trim(),age:document.getElementById('acAge').value,level:document.getElementById('acLevel').value,package_size:pkg,remaining:parseInt(document.getElementById('acRemaining').value)||0,schedule:document.getElementById('acSchedule').value.trim(),duration:parseInt(document.getElementById('acDuration').value)||60,goals:document.getElementById('acGoals').value.trim(),injuries:document.getElementById('acInjuries').value.trim(),notes:document.getElementById('acNotes').value.trim(),exercise_history:{}});
    if(created&&created[0])clients.push(created[0]);
    closeModal('addClientModal');renderClientList();renderDashboard();toast(`${first} added ✓`);
  }catch(e){toast('Error saving client');}
}

function openEditClient(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  document.getElementById('ecId').value=id;document.getElementById('ecFirst').value=c.first;document.getElementById('ecLast').value=c.last||'';document.getElementById('ecAge').value=c.age||'';document.getElementById('ecLevel').value=c.level||'Intermediate';document.getElementById('ecPackage').value=c.package_size||0;document.getElementById('ecRemaining').value=c.remaining||0;document.getElementById('ecSchedule').value=c.schedule||'';document.getElementById('ecDuration').value=c.duration||60;document.getElementById('ecGoals').value=c.goals||'';document.getElementById('ecInjuries').value=c.injuries||'';document.getElementById('ecNotes').value=c.notes||'';
  closeModal('clientModal');openModal('editClientModal');
}
async function saveEditClient(){
  const id=document.getElementById('ecId').value;const c=clients.find(x=>x.id===id);if(!c)return;
  const data={first:document.getElementById('ecFirst').value.trim(),last:document.getElementById('ecLast').value.trim(),age:document.getElementById('ecAge').value,level:document.getElementById('ecLevel').value,package_size:parseInt(document.getElementById('ecPackage').value)||0,remaining:parseInt(document.getElementById('ecRemaining').value)||0,schedule:document.getElementById('ecSchedule').value.trim(),duration:parseInt(document.getElementById('ecDuration').value)||60,goals:document.getElementById('ecGoals').value.trim(),injuries:document.getElementById('ecInjuries').value.trim(),notes:document.getElementById('ecNotes').value.trim()};
  try{await db.updateClient(id,data);Object.assign(c,data);closeModal('editClientModal');renderClientModal(c);openModal('clientModal');renderClientList();renderDashboard();toast('Updated ✓');}
  catch(e){toast('Error updating');}
}

async function openClientDetail(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  document.getElementById('clientModalBody').innerHTML=`<div class="loading" style="padding:60px 20px"><div class="spinner"></div></div>`;
  openModal('clientModal');
  try{c._sessions=await db.getSessions(id);}catch(e){c._sessions=[];}
  renderClientModal(c);
}

function renderClientModal(c){
  const hasPkg=c.package_size>0;
  const pct=hasPkg?Math.max(0,c.remaining/c.package_size*100):0;
  const col=!hasPkg?'var(--muted)':c.remaining<=0?'var(--danger)':c.remaining<=2?'var(--warn)':'var(--success)';
  const sessions=c._sessions||[];
  const isSummer=c.first.toLowerCase().includes('summer');

  const sessHtml=sessions.length===0
    ?'<div class="muted" style="padding:8px 0;font-size:13px">No sessions logged yet.</div>'
    :sessions.slice(0,10).map(s=>`
      <div style="display:flex;align-items:flex-start;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:13px;font-weight:500">${s.date}</div>
          ${s.note?`<div class="muted" style="font-size:12px">${s.note}</div>`:''}
          ${s.workout&&s.workout.length>0?`<div style="font-size:11px;color:var(--accent2);margin-top:3px">${s.workout.map(w=>`${w.name}${w.weight?' · '+w.weight:''}`).join(' · ')}</div>`:''}
        </div>
        <span class="badge badge-green">✓</span>
      </div>`).join('')
    +(sessions.length>10?`<div class="muted" style="font-size:12px;padding-top:8px">+${sessions.length-10} more</div>`:'');

  let progSection='';
  if(c.structured_program)progSection=renderStructuredProgram(c);
  else if(c.program)progSection=`<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn btn-secondary btn-sm" onclick="generateProgram('${c.id}')">↺ Regen</button></div>`+renderAIProgramHtml(c.program);
  else progSection=`<div style="text-align:center;padding:24px 0"><div class="muted" style="margin-bottom:14px;font-size:13px">No program yet</div><button class="btn btn-primary" onclick="generateProgram('${c.id}')">✦ Generate 6-Week Program</button></div>`;

  document.getElementById('clientModalBody').innerHTML=`
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="client-avatar" style="width:46px;height:46px;font-size:17px">${c.first[0]}${c.last?c.last[0]:''}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800">${c.first} ${c.last}</span>
          ${isSummer?'<span class="badge badge-summer">☀️</span>':''}
        </div>
        <div class="muted" style="font-size:12px">${c.level}${c.age?' · Age '+c.age:''} · ${c.duration||60} min</div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="closeModal('clientModal')">✕</button>
    </div>
    ${c.schedule?`<div style="margin-bottom:14px"><div class="label" style="margin-bottom:4px">Schedule</div><div style="font-size:13px;color:var(--accent2)">${c.schedule}</div>${c.notes?`<div class="muted" style="font-size:12px;margin-top:3px">${c.notes}</div>`:''}</div>`:''}
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${hasPkg?'10':'0'}px">
        <div>
          <div class="label">Package</div>
          ${hasPkg?`<div style="font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:${col};line-height:1.1">${c.remaining}<span style="font-size:14px;color:var(--muted)"> / ${c.package_size}</span></div><div class="muted" style="font-size:12px">sessions remaining</div>`:`<div class="muted" style="font-size:13px;padding-top:4px">No package set</div>`}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <button class="btn btn-primary btn-sm" onclick="openLogSession('${c.id}')">Log Session</button>
          <button class="btn btn-secondary btn-sm" onclick="openRenew('${c.id}')">Renew Package</button>
        </div>
      </div>
      ${hasPkg?`<div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>`:''}
    </div>
    ${c.goals||c.injuries?`<div class="card" style="margin-bottom:12px">${c.goals?`<div class="label" style="margin-bottom:4px">Goals</div><div style="font-size:13px">${c.goals}</div>`:''}${c.goals&&c.injuries?'<div class="divider"></div>':''}${c.injuries?`<div class="label" style="margin-bottom:4px">Injuries</div><div style="font-size:13px;color:var(--warn)">${c.injuries}</div>`:''}</div>`:''}
    <div style="margin-bottom:16px">
      <div class="label" style="margin-bottom:8px">Session History (${sessions.length})</div>
      ${sessHtml}
    </div>
    <div class="divider"></div>
    <div class="label" style="margin-bottom:10px">Program</div>
    <div id="prog-${c.id}">${progSection}</div>
    <div class="divider"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-secondary btn-full btn-sm" onclick="openEditClient('${c.id}')">✎ Edit</button>
      <button class="btn btn-danger btn-full btn-sm" onclick="deleteClient('${c.id}')">Remove</button>
    </div>`;
}

function renderStructuredProgram(c){
  const prog=c.structured_program;const history=c.exercise_history||{};
  return prog.days.map((day,di)=>{
    const exRows=day.exercises.map(ex=>{
      const key=ex.name.toLowerCase().replace(/\s+/g,'_');
      const last=history[key];
      const isSuperset=ex.name.match(/^SS\d[AB]:/i);
      const lastHtml=last?`<div class="ex-last has-data">📊 Last: <b>${last.reps||'—'}</b> · <b>${last.weight||'—'}</b> · <span style="opacity:.7">${last.date}</span></div>`:`<div class="ex-last">No data yet</div>`;
      return `<div class="ex-row" ${isSuperset?'style="padding-left:24px;border-left:2px solid var(--warn);margin-left:14px"':''}>
        ${isSuperset?`<div class="ss-label">Superset</div>`:''}
        <div class="ex-name">${ex.name.replace(/^SS\d[AB]:\s*/i,'')}</div>
        <div class="ex-prescription">${ex.prescription}${ex.load?' · <span style="color:var(--muted)">'+ex.load+'</span>':''}</div>
        ${lastHtml}
      </div>`;
    }).join('');
    return `<div class="prog-day-block">
      <div class="prog-day-header" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="prog-day-title" style="color:${day.color}">${day.name}</span>
        <span style="color:var(--muted);font-size:11px">${day.exercises.length} exercises ▼</span>
      </div>
      <div class="prog-day-body ${di===0?'open':''}">${exRows}</div>
    </div>`;
  }).join('');
}

function openLogSession(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  if(c.package_size>0&&c.remaining<=0){toast('⚠️ No sessions left — renew first!');return;}
  pendingLogId=id;
  document.getElementById('logModalTitle').textContent=`Log Session — ${c.first}`;
  document.getElementById('logNote').value='';
  let workoutHtml='';
  if(c.structured_program){
    workoutHtml=`<div class="form-group"><label class="form-label">Today's Workout</label>
      <select id="logDaySelect" onchange="updateLogWorkout('${id}')">${c.structured_program.days.map((d,i)=>`<option value="${i}">${d.name}</option>`).join('')}</select></div>
      <div id="logExercises"></div>`;
  }
  document.getElementById('logWorkoutSection').innerHTML=workoutHtml;
  if(c.structured_program)setTimeout(()=>updateLogWorkout(id),50);
  openModal('logModal');
}

function updateLogWorkout(clientId){
  const c=clients.find(x=>x.id===clientId);if(!c||!c.structured_program)return;
  const di=parseInt(document.getElementById('logDaySelect').value)||0;
  const day=c.structured_program.days[di];const history=c.exercise_history||{};
  let html='';let inSuperset=false;
  day.exercises.forEach((ex,ei)=>{
    const key=ex.name.toLowerCase().replace(/\s+/g,'_');
    const last=history[key];
    const isSuperset=ex.name.match(/^SS\d[AB]:/i);
    const displayName=ex.name.replace(/^SS\d[AB]:\s*/i,'');
    html+=`<div class="workout-ex-row" ${isSuperset?'style="border-left:2px solid var(--warn);padding-left:14px"':''}>
      ${isSuperset?`<div class="ss-label">Superset</div>`:''}
      <div class="workout-ex-name">${displayName}</div>
      <div style="font-size:11px;color:var(--accent);margin-bottom:${last?'4':'6'}px">${ex.prescription}${ex.load?' · '+ex.load:''}</div>
      ${last?`<div style="font-size:11px;color:var(--accent2);margin-bottom:6px">Last: ${last.reps||'—'} · ${last.weight||'—'} on ${last.date}</div>`:''}
      <div class="workout-inputs">
        <div><input id="wr-${ei}" placeholder="${last&&last.reps?last.reps:'Sets × Reps'}"><div class="wi-label">Sets × Reps</div></div>
        <div><input id="wt-${ei}" placeholder="${last&&last.weight?last.weight:'Weight / Load'}"><div class="wi-label">Weight / Load</div></div>
      </div>
    </div>`;
  });
  document.getElementById('logExercises').innerHTML=html;
}

async function confirmLogSession(){
  const c=clients.find(x=>x.id===pendingLogId);if(!c)return;
  const note=document.getElementById('logNote').value.trim();
  const dateStr=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  let workout=[];const newHistory={...(c.exercise_history||{})};
  const exLogs=[];

  if(c.structured_program){
    const di=parseInt(document.getElementById('logDaySelect')?.value)||0;
    const day=c.structured_program.days[di];
    day.exercises.forEach((ex,ei)=>{
      const wr=document.getElementById('wr-'+ei)?.value.trim();
      const wt=document.getElementById('wt-'+ei)?.value.trim();
      if(wr||wt){
        const key=ex.name.toLowerCase().replace(/\s+/g,'_');
        newHistory[key]={reps:wr||'',weight:wt||'',date:dateStr};
        workout.push({name:ex.name,reps:wr||'',weight:wt||''});
        // Build individual exercise log entry
        exLogs.push({
          client_id:c.id,
          session_date:dateStr,
          exercise_name:ex.name.replace(/^SS\d[AB]:\s*/i,''),
          reps:wr||'',
          weight:wt||'',
          day_name:day.name
        });
      }
    });
  }

  try{
    await db.addSession({client_id:c.id,date:dateStr,note,workout});
    // Save individual exercise logs
    for(const log of exLogs){ await db.addExLog(log); }
    const newRemaining=c.package_size>0?Math.max(0,c.remaining-1):c.remaining;
    await db.updateClient(c.id,{remaining:newRemaining,exercise_history:newHistory});
    c.remaining=newRemaining;c.exercise_history=newHistory;
    c._sessions=await db.getSessions(c.id);
    closeModal('logModal');renderClientModal(c);renderDashboard();
    if(c.package_size>0){
      if(c.remaining===0)setTimeout(()=>toast(`🔴 ${c.first} is OUT — invoice via Square!`),300);
      else if(c.remaining<=2)setTimeout(()=>toast(`🟡 ${c.first} has ${c.remaining} left`),300);
      else toast(`Session logged ✓ — ${c.remaining} remaining`);
    }else toast('Session logged ✓');
  }catch(e){toast('Error saving session');console.error(e);}
}

function openRenew(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  pendingRenewId=id;document.getElementById('renewTitle').textContent=`Renew — ${c.first}`;
  document.getElementById('renewPkg').value=c.package_size||10;openModal('renewModal');
}
async function confirmRenew(){
  const c=clients.find(x=>x.id===pendingRenewId);if(!c)return;
  const pkg=parseInt(document.getElementById('renewPkg').value);
  try{await db.updateClient(c.id,{package_size:pkg,remaining:pkg});c.package_size=pkg;c.remaining=pkg;closeModal('renewModal');renderClientModal(c);renderDashboard();toast(`${c.first} renewed — ${pkg} sessions ✓`);}
  catch(e){toast('Error renewing');}
}

async function deleteClient(id){
  if(!confirm('Remove this client?'))return;
  try{await db.deleteClient(id);clients=clients.filter(x=>x.id!==id);closeModal('clientModal');renderClientList();renderDashboard();toast('Removed');}
  catch(e){toast('Error removing client');}
}

function renderEquipList(){
  const el=document.getElementById('equipList');
  el.innerHTML=equipment.length===0?`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🏋️</div>No equipment added yet</div>`:equipment.map(e=>`<div class="equip-item"><span>${e.name}</span><span class="remove" onclick="removeEquip('${e.id}')">×</span></div>`).join('');
}
function openAddEquip(){document.getElementById('equipName').value='';openModal('addEquipModal');}
async function saveEquip(){
  const name=document.getElementById('equipName').value.trim();if(!name)return;
  try{const created=await db.addEquipment(name);if(created&&created[0])equipment.push(created[0]);closeModal('addEquipModal');renderEquipList();toast(`${name} added ✓`);}
  catch(e){toast('Error adding equipment');}
}
async function removeEquip(id){
  try{await db.delEquipment(id);equipment=equipment.filter(e=>e.id!==id);renderEquipList();}
  catch(e){toast('Error removing equipment');}
}

async function generateProgram(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  const section=document.getElementById('prog-'+id);if(!section)return;
  section.innerHTML=`<div class="ai-output"><span class="ai-thinking">✦ Building program for ${c.first}...<span class="cursor-blink"> |</span></span></div>`;
  const equip=equipment.length>0?equipment.map(e=>e.name).join(', '):'Barbell, Dumbbells, Squat rack, Bench, Pull-up bar, Cable machine, Leg press, Bands';
  const days=(c.schedule?.match(/mon|tue|wed|thu|fri|sat|sun/gi)||[]).length||3;
  const prompt=`Expert trainer. 6-week program.\nClient: ${c.first}, ${c.level}, Goals: ${c.goals||'General fitness'}, Injuries: ${c.injuries||'None'}, ${days} days/week, ${c.duration||60} min.\nEquipment: ${equip}\nFormat:\nWEEK 1-2: FOUNDATION\nDay 1 (Push):\n• Exercise — 3x10\nDay 2 (Rest)\nCoach's Note: note\n\nWEEK 3-4: BUILD\n[same]\n\nWEEK 5-6: PEAK\n[same]`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();const text=data.content?.map(b=>b.text||'').join('')||'Could not generate.';
    await db.updateClient(c.id,{program:text});c.program=text;
    if(section)section.innerHTML=renderAIProgramHtml(text);
  }catch(e){if(section)section.innerHTML=`<div class="ai-output" style="color:var(--danger)">Failed. Try again.</div>`;}
}

function renderAIProgramHtml(text){
  const lines=text.split('\n');let weeks=[],cur=null;
  lines.forEach(line=>{const t=line.trim();if(!t)return;if(/^WEEK\s+\d/i.test(t)){if(cur)weeks.push(cur);cur={title:t,days:[],coach:''};}else if(cur){if(/^Coach'?s?\s+Note/i.test(t))cur.coach=t.replace(/^Coach'?s?\s+Note:?\s*/i,'');else if(/^Day\s+\d/i.test(t)){const m=t.match(/\(([^)]+)\)/);cur.days.push({label:t.split('(')[0].trim(),type:m?m[1]:'',exercises:[]});}else if((t.startsWith('•')||t.startsWith('-'))&&cur.days.length>0)cur.days[cur.days.length-1].exercises.push(t.replace(/^[•\-]\s*/,''));}});
  if(cur)weeks.push(cur);if(!weeks.length)return`<div class="ai-output">${text}</div>`;
  return weeks.map((w,wi)=>{
    const dHtml=w.days.map(d=>{const exHtml=d.exercises.map(ex=>{const p=ex.split('—');return`<div style="font-size:13px;line-height:1.7">${p[0]?.trim()} ${p[1]?'<span style="color:var(--muted);font-size:12px">— '+p[1].trim()+'</span>':''}</div>`;}).join('');return`<div style="padding:10px 14px;border-top:1px solid var(--border)"><div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--accent);margin-bottom:3px">${d.label}</div>${d.type?`<div style="font-size:11px;color:var(--muted);margin-bottom:4px">${d.type}</div>`:''} ${exHtml}</div>`;}).join('');
    return`<div class="prog-day-block"><div class="prog-day-header" onclick="this.nextElementSibling.classList.toggle('open')"><span class="prog-day-title">${w.title}</span><span style="color:var(--muted);font-size:10px">▼</span></div><div class="prog-day-body ${wi===0?'open':''}">${dHtml}${w.coach?`<div style="padding:10px 14px;border-top:1px solid var(--border)"><div style="font-size:12px;color:var(--accent2);font-style:italic">💬 ${w.coach}</div></div>`:''}</div></div>`;
  }).join('');
}
