<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Baymade Training</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#070910;color:#eef2fa;font-family:sans-serif;-webkit-font-smoothing:antialiased;}
.hdr{position:sticky;top:0;z-index:10;background:rgba(7,9,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(120,160,255,0.18);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;}
.brand{font-size:10px;color:#60a5fa;letter-spacing:3px;font-weight:700;}
.sub{font-size:9px;color:rgba(180,200,235,0.45);letter-spacing:1px;margin-top:2px;}
main{padding:20px 16px 80px;max-width:560px;margin:0 auto;}
.week{display:flex;gap:6px;overflow-x:auto;margin-bottom:24px;padding-bottom:4px;scrollbar-width:none;}
.week::-webkit-scrollbar{display:none;}
.wd{flex-shrink:0;width:50px;background:#0d1018;border:1px solid rgba(120,160,255,0.1);border-radius:12px;padding:10px 0;text-align:center;cursor:pointer;}
.wd.active{background:#2563eb;border-color:#2563eb;box-shadow:0 4px 16px rgba(37,99,235,0.4);}
.wd.workout{border-color:rgba(96,165,250,0.35);}
.wd.done{background:rgba(52,211,153,0.06);border-color:rgba(52,211,153,0.35);}
.ex{background:#0d1018;border:1px solid rgba(120,160,255,0.1);border-radius:11px;padding:14px;margin-bottom:10px;}
.ex.ss{border-left:3px solid #fbbf24;}
.inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.inputs input{width:100%;background:#131720;border:1px solid rgba(120,160,255,0.18);border-radius:9px;color:#eef2fa;font-size:15px;font-weight:600;padding:13px 12px;text-align:center;outline:none;}
.inputs input:focus{border-color:#2563eb;}
.inputs input:not(:placeholder-shown){color:#34d399!important;-webkit-text-fill-color:#34d399!important;}
.note{width:100%;background:#131720;border:1px solid rgba(120,160,255,0.18);border-radius:11px;color:#eef2fa;font-size:14px;padding:14px;resize:none;height:75px;outline:none;margin-bottom:14px;font-family:sans-serif;}
.log-btn{width:100%;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border:none;border-radius:11px;padding:17px;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 24px rgba(37,99,235,0.4);}
.log-btn:active{transform:scale(0.98);}
.log-btn:disabled{opacity:0.5;}
.rest{background:#0d1018;border:1px solid rgba(120,160,255,0.1);border-radius:16px;padding:32px 20px;text-align:center;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:#131720;border:1px solid rgba(120,160,255,0.18);border-radius:10px;padding:12px 20px;font-size:13px;z-index:400;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{opacity:0;transform:scale(0.3)}70%{opacity:1;transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="brand">BAYMADE TRAINING</div><div class="sub">CLIENT PORTAL</div></div>
  <div style="text-align:right"><div id="cname" style="font-size:13px;font-weight:700">—</div><div id="clvl" style="font-size:10px;color:rgba(180,200,235,0.45);margin-top:1px">—</div></div>
</div>
<main id="main">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px">
    <div style="width:36px;height:36px;border:3px solid rgba(120,160,255,0.18);border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite"></div>
    <div style="font-size:12px;color:rgba(180,200,235,0.45);letter-spacing:2px;text-transform:uppercase">Loading your workouts</div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>document.getElementById('main').innerHTML='<p style="padding:20px;color:#34d399">Script reached</p>';</script>

</html>
