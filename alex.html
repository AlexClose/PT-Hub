<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Baymade Training</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#070910;color:#eef2fa;font-family:sans-serif;-webkit-font-smoothing:antialiased;}
.hdr{position:sticky;top:0;z-index:10;background:rgba(7,9,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(120,160,255,0.18);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;}
.brand{font-size:10px;color:#60a5fa;letter-spacing:3px;font-weight:700;}
.sub{font-size:9px;color:rgba(180,200,235,0.45);letter-spacing:1px;margin-top:2px;}
main{padding:20px 16px 80px;max-width:560px;margin:0 auto;}
.week{display:flex;gap:6px;overflow-x:auto;margin-bottom:24px;padding-bottom:4px;scrollbar-width:none;}
.week::-webkit-scrollbar{display:none;}
.wd{flex-shrink:0;width:50px;background:#0d1018;border:1px solid rgba(120,160,255,0.1);border-radius:12px;padding:10px 0;text-align:center;cursor:pointer;}
.wd.active{background:#2563eb;border-color:#2563eb;box-shadow:0 4px 16px rgba(37,99,235,0.4);}
.wd.workout{border-color:rgba(96,165,250,0.35);}
.wd.done{background:rgba(52,211,153,0.06);border-color:rgba(52,211,153,0.35);}
.ex{background:#0d1018;border:1px solid rgba(120,160,255,0.1);border-radius:11px;padding:14px;margin-bottom:10px;}
.ex.ss{border-left:3px solid #fbbf24;}
.inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.inputs input{width:100%;background:#131720;border:1px solid rgba(120,160,255,0.18);border-radius:9px;color:#eef2fa;font-size:15px;font-weight:600;padding:13px 12px;text-align:center;outline:none;}
.inputs input:focus{border-color:#2563eb;}
.inputs input:not(:placeholder-shown){color:#34d399!important;-webkit-text-fill-color:#34d399!important;}
.note{width:100%;background:#131720;border:1px solid rgba(120,160,255,0.18);border-radius:11px;color:#eef2fa;font-size:14px;padding:14px;resize:none;height:75px;outline:none;margin-bottom:14px;font-family:sans-serif;}
.log-btn{width:100%;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border:none;border-radius:11px;padding:17px;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 24px rgba(37,99,235,0.4);}
.log-btn:active{transform:scale(0.98);}
.log-btn:disabled{opacity:0.5;}
.rest{background:#0d1018;border:1px solid rgba(120,160,255,0.1);border-radius:16px;padding:32px 20px;text-align:center;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:#131720;border:1px solid rgba(120,160,255,0.18);border-radius:10px;padding:12px 20px;font-size:13px;z-index:400;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{opacity:0;transform:scale(0.3)}70%{opacity:1;transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="brand">BAYMADE TRAINING</div><div class="sub">CLIENT PORTAL</div></div>
  <div style="text-align:right"><div id="cname" style="font-size:13px;font-weight:700">--</div><div id="clvl" style="font-size:10px;color:rgba(180,200,235,0.45);margin-top:1px">--</div></div>
</div>
<main id="main">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px">
    <div style="width:36px;height:36px;border:3px solid rgba(120,160,255,0.18);border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite"></div>
    <div style="font-size:12px;color:rgba(180,200,235,0.45);letter-spacing:2px;text-transform:uppercase">Loading your workouts</div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
var SB_URL='https://oneykldgivaqcrqmrqha.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uZXlrbGRnaXZhcWNycW1ycWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTQ4NTYsImV4cCI6MjA5MzU3MDg1Nn0.Os-XjWM6nJuFOLLQhBUH0DUL40So-jkpXGx9iBequyw';
var H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
var CLIENT_ID='06acdc81-5f0b-4481-917a-d27baf89bc51';
var cli=null,sess=[],aDay=null;
var DN=['Su','Mo','Tu','We','Th','Fr','Sa'];

function sb(method,table,body,params){
if(params===undefined)params=’’;
var url=SB_URL+’/rest/v1/’+table+params;
var opts={method:method,headers:H};
if(body)opts.body=JSON.stringify(body);
return fetch(url,opts).then(function(res){
return res.text().then(function(t){
if(!res.ok)throw new Error(t||‘Request failed’);
return t?JSON.parse(t):[];
});
});
}

function toast(m){
var t=document.getElementById(‘toast’);
if(!t)return;
t.textContent=m;
t.classList.add(‘show’);
setTimeout(function(){t.classList.remove(‘show’);},3000);
}

function greet(){
var h=new Date().getHours();
return h<12?‘Good morning’:h<17?‘Good afternoon’:‘Good evening’;
}

function getSM(){
var prog=cli.structured_program;
if(!prog||!prog.days)return{};
var days=prog.days;
var sc=(cli.schedule||’’).toLowerCase();
var dm={sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6,sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6};
var m=[],map={};
Object.keys(dm).forEach(function(k){
if(sc.indexOf(k)!==-1&&m.indexOf(dm[k])===-1)m.push(dm[k]);
});
m.sort(function(a,b){return a-b;});
m.forEach(function(d,i){if(i<days.length)map[d]=i;});
return map;
}

function showError(msg){
var main=document.getElementById(‘main’);
if(!main)return;
main.innerHTML=’<div style="padding:24px"><div style="color:#f87171;font-size:13px;background:#1a0a0a;border:1px solid rgba(255,100,100,0.2);border-radius:10px;padding:16px;margin-bottom:12px">ERROR: ‘+msg+’</div><button onclick="init()" style="margin-top:16px;width:100%;background:#2563eb;color:#fff;border:none;border-radius:10px;padding:14px;font-size:13px;font-weight:700;cursor:pointer">Retry</button></div>’;
}

function init(){
sb(‘GET’,‘clients’,null,’?id=eq.’+CLIENT_ID)
.then(function(clients){
if(!clients||clients.length===0)throw new Error(‘Client not found’);
cli=clients[0];
return sb(‘GET’,‘sessions’,null,’?client_id=eq.’+CLIENT_ID+’&order=created_at.desc’);
})
.then(function(s){
sess=s;
var cnEl=document.getElementById(‘cname’);
var clEl=document.getElementById(‘clvl’);
if(cnEl)cnEl.textContent=((cli.first||’’)+’ ‘+(cli.last||’’)).trim();
if(clEl)clEl.textContent=(cli.level||’’)+’ - ‘+(cli.duration||60)+’ min’;
var sm=getSM();
var ti=new Date().getDay();
aDay=sm[ti]!==undefined?sm[ti]:null;
render();
})
.catch(function(e){
showError(e.message||‘Unknown error’);
});
}

function render(){
var prog=cli.structured_program;
var days=prog&&prog.days?prog.days:[];
var sm=getSM();
var now=new Date();
var ds=now.toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’,year:‘numeric’});
var tL=sess.some(function(s){return s.date===ds;});
var sow=new Date(now);
sow.setDate(now.getDate()-now.getDay());

var week=’<div class="week">’;
for(var i=0;i<7;i++){
var d=new Date(sow);
d.setDate(sow.getDate()+i);
var di=d.getDay();
var isTod=d.toDateString()===now.toDateString();
var pdi=sm[di];
var hasW=pdi!==undefined;
var dStr=d.toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’,year:‘numeric’});
var isLog=sess.some(function(sv){return sv.date===dStr;});
var cls=‘wd’+(isTod&&aDay!==null?’ active’:hasW?’ workout’:’’)+(isLog?’ done’:’’);
var wn=hasW&&days[pdi]?days[pdi].name.split(’ ‘)[0]:’’;
var dayLabelCol=isTod&&aDay!==null?‘rgba(255,255,255,0.8)’:‘rgba(180,200,235,0.4)’;
var dateCol=isTod&&aDay!==null?’#fff’:’#eef2fa’;
var dotC=isTod&&aDay!==null?‘rgba(255,255,255,0.6)’:isLog?’#34d399’:hasW?’#60a5fa’:‘transparent’;
var pdiFinal=pdi!==undefined?pdi:‘null’;
week+=’<div class="'+cls+'" onclick="selDay('+pdiFinal+')">’;
week+=’<div style="font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:'+dayLabelCol+'">’+DN[di]+’</div>’;
week+=’<div style="font-size:16px;font-weight:700;margin:2px 0;color:'+dateCol+'">’+d.getDate()+’</div>’;
week+=’<div style="width:5px;height:5px;border-radius:50%;margin:3px auto 0;background:'+dotC+'"></div>’;
if(wn)week+=’<div style="font-size:7px;color:rgba(100,160,255,0.6);margin-top:2px">’+wn+’</div>’;
week+=’</div>’;
}
week+=’</div>’;

var wc=’’;
if(aDay===null){
wc=’<div class="rest"><div style="font-size:18px;font-weight:700;margin-bottom:6px">Rest Day</div><div style="font-size:13px;color:rgba(180,200,235,0.45)">No workout today. Recovery is part of the program!</div></div>’;
} else {
var day=days[aDay];
var hist=cli.exercise_history||{};
var exs=’’;
if(day&&day.exercises){
for(var ei=0;ei<day.exercises.length;ei++){
var ex=day.exercises[ei];
var key=ex.name.toLowerCase().replace(/\s+/g,’_’);
var last=hist[key];
var isSS=/^SS/i.test(ex.name);
var nm=ex.name.replace(/^SS\w+:\s*/i,’’);
var lastHtml=’’;
if(last){
lastHtml=’<div style="font-size:11px;color:#60a5fa;background:rgba(37,99,235,0.1);border:1px solid rgba(37,99,235,0.2);border-radius:6px;padding:5px 10px;display:inline-block;margin-bottom:10px">Last: ‘+(last.reps||’-’)+’  /  ‘+(last.weight||’-’)+’</div>’;
}
var rph=last&&last.reps?last.reps:‘Sets x Reps’;
var wph=last&&last.weight?last.weight:‘Weight / Load’;
var loadStr=ex.load?’  /  ‘+ex.load:’’;
exs+=’<div class="ex'+(isSS?' ss':'')+'">’;
if(isSS)exs+=’<span style="font-size:8px;font-weight:700;letter-spacing:2px;color:#fbbf24;background:rgba(251,191,36,0.1);border-radius:4px;padding:2px 6px;display:inline-block;margin-bottom:7px">SUPERSET</span>’;
exs+=’<div style="font-size:15px;font-weight:600;margin-bottom:3px">’+nm+’</div>’;
exs+=’<div style="font-size:12px;color:#60a5fa;margin-bottom:8px">’+ex.prescription+loadStr+’</div>’;
exs+=lastHtml;
exs+=’<div class="inputs">’;
exs+=’<div><input id="r'+ei+'" placeholder="'+rph+'"><div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(180,200,235,0.45);text-align:center;margin-top:4px">Sets x Reps</div></div>’;
exs+=’<div><input id="w'+ei+'" placeholder="'+wph+'"><div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(180,200,235,0.45);text-align:center;margin-top:4px">Weight / Load</div></div>’;
exs+=’</div></div>’;
}
}
var exCount=day&&day.exercises?day.exercises.length:0;
var loggedNote=tL?’ - <span style="color:#34d399">Logged today</span>’:’’;
wc=’<div style="background:#0d1018;border:1px solid rgba(120,160,255,0.18);border-radius:16px;padding:18px 20px;margin-bottom:14px;position:relative;overflow:hidden">’;
wc+=’<div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#2563eb,#60a5fa,#93c5fd)"></div>’;
wc+=’<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(180,200,235,0.45);margin-bottom:6px">Today's Workout</div>’;
wc+=’<div style="font-size:22px;font-weight:700">’+(day?day.name:’’)+’</div>’;
wc+=’<div style="font-size:12px;color:rgba(180,200,235,0.45);margin-top:4px">’+exCount+’ exercises’+loggedNote+’</div>’;
wc+=’</div>’;
wc+=exs;
wc+=’<textarea class="note" id="snote" placeholder="Add a note (optional)..."></textarea>’;
wc+=’<button class="log-btn" id="lbtn" onclick="logIt()">LOG THIS WORKOUT</button>’;
}

var hh=’’;
if(sess.length>0){
hh=’<div style="margin-top:28px"><div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(180,200,235,0.45);margin-bottom:12px">Recent Sessions</div>’;
var recent=sess.slice(0,5);
for(var si=0;si<recent.length;si++){
var sv=recent[si];
var wnames=’’;
if(sv.workout&&sv.workout.length){
var sl=sv.workout.slice(0,3).map(function(w){return w.name.replace(/^SS\w+:\s*/i,’’);});
wnames=’<div style="font-size:11px;color:rgba(180,200,235,0.45);margin-top:2px">’+sl.join(’ / ‘)+(sv.workout.length>3?’ +’+(sv.workout.length-3)+’ more’:’’)+’</div>’;
}
hh+=’<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(120,160,255,0.08)">’;
hh+=’<div><div style="font-size:13px;font-weight:600">’+sv.date+’</div>’+wnames+’</div>’;
hh+=’<span style="font-size:10px;color:#34d399;font-weight:700">Done</span>’;
hh+=’</div>’;
}
hh+=’</div>’;
}

var greeting=’<div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(180,200,235,0.45);margin-bottom:6px">Client Portal</div>’;
greeting+=’<div style="font-size:26px;font-weight:700;line-height:1.2;margin-bottom:6px;font-family:\'Syne\',sans-serif">’+greet()+’,<br>’+cli.first+’</div>’;
greeting+=’<div style="font-size:13px;color:rgba(180,200,235,0.45);margin-bottom:24px">’+(aDay!==null?‘Here's your workout for today.’:‘Rest up - no workout today.’)+’</div>’;

var main=document.getElementById(‘main’);
if(main)main.innerHTML=greeting+week+wc+hh;
}

function selDay(idx){
if(idx===null||idx===undefined)return;
aDay=idx;
render();
}

function logIt(){
var btn=document.getElementById(‘lbtn’);
if(!btn)return;
btn.disabled=true;
btn.textContent=‘Saving…’;

var day=cli.structured_program.days[aDay];
var ds=new Date().toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’,year:‘numeric’});
var noteEl=document.getElementById(‘snote’);
var note=noteEl?noteEl.value.trim():’’;
var hist=Object.assign({},cli.exercise_history||{});
var wo=[];

for(var i=0;i<day.exercises.length;i++){
var ex=day.exercises[i];
var rEl=document.getElementById(‘r’+i);
var wEl=document.getElementById(‘w’+i);
var r=rEl?rEl.value.trim():’’;
var w=wEl?wEl.value.trim():’’;
if(r||w){
hist[ex.name.toLowerCase().replace(/\s+/g,’_’)]={reps:r||’’,weight:w||’’,date:ds};
wo.push({name:ex.name,reps:r||’’,weight:w||’’});
}
}

sb(‘POST’,‘sessions’,{client_id:CLIENT_ID,date:ds,note:note,workout:wo})
.then(function(){
return sb(‘PATCH’,‘clients’,{exercise_history:hist},’?id=eq.’+CLIENT_ID);
})
.then(function(){
cli.exercise_history=hist;
return sb(‘GET’,‘sessions’,null,’?client_id=eq.’+CLIENT_ID+’&order=created_at.desc’);
})
.then(function(s){
sess=s;
var ov=document.createElement(‘div’);
ov.style.cssText=‘position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);pointer-events:none;’;
ov.innerHTML=’<div style="display:flex;flex-direction:column;align-items:center;gap:16px;animation:pop .5s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0"><div style="width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#34d399);display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;font-weight:800">OK</div><div style="font-size:24px;font-weight:700;letter-spacing:3px;color:#fff;font-family:\'Syne\',sans-serif">CRUSHED IT</div><div style="font-size:13px;color:rgba(52,211,153,0.8)">Workout saved</div></div>’;
document.body.appendChild(ov);
setTimeout(function(){
ov.style.transition=‘opacity .4s’;
ov.style.opacity=‘0’;
setTimeout(function(){ov.remove();},400);
},1400);
render();
})
.catch(function(e){
if(btn){btn.disabled=false;btn.textContent=‘LOG THIS WORKOUT’;}
toast(‘Error saving - try again’);
});
}

init();
</script>

</body>
</html>
