<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Baymade Training</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070910;--surface:#0d1018;--surface2:#131720;--surface3:#181d28;
  --border:rgba(120,160,255,0.1);--border2:rgba(120,160,255,0.18);
  --text:#eef2fa;--muted:rgba(180,200,235,0.45);
  --accent:#2563eb;--accent2:#60a5fa;--accent3:#93c5fd;
  --success:#34d399;--warn:#fbbf24;--danger:#f87171;
  --radius:16px;--radius-sm:11px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);}
body{color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(37,99,235,0.15),transparent),radial-gradient(ellipse 60% 40% at 90% 80%,rgba(67,217,162,0.06),transparent);pointer-events:none;}
.header{position:sticky;top:0;z-index:100;padding:env(safe-area-inset-top,0) 20px 0;background:rgba(7,9,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0 12px;}
.brand-name{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(90deg,var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.brand-tag{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.client-badge{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);text-align:right;}
.client-level{font-size:10px;color:var(--muted);text-align:right;margin-top:1px;}
main{position:relative;z-index:1;padding:20px 16px 100px;max-width:560px;margin:0 auto;}
.greeting{margin-bottom:24px;}
.greeting-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.greeting-text{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1.15;}
.greeting-sub{font-size:13px;color:var(--muted);margin-top:6px;}
.week-strip{display:flex;gap:6px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.week-strip::-webkit-scrollbar{display:none;}
.week-day{flex-shrink:0;width:52px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 0;text-align:center;cursor:pointer;transition:all .2s;}
.week-day.active{background:var(--accent);border-color:var(--accent);box-shadow:0 4px 16px rgba(37,99,235,0.4);}
.week-day.has-workout{border-color:rgba(120,160,255,0.3);}
.week-day.logged{border-color:rgba(52,211,153,0.4);background:rgba(52,211,153,0.06);}
.wd-name{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.week-day.active .wd-name,.week-day.active .wd-num{color:#fff;}
.wd-num{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text);margin:2px 0;}
.wd-dot{width:5px;height:5px;border-radius:50%;margin:3px auto 0;}
.week-day.has-workout .wd-dot{background:var(--accent2);}
.week-day.active .wd-dot{background:rgba(255,255,255,0.6);}
.week-day.logged .wd-dot{background:var(--success);}
.workout-header{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;position:relative;overflow:hidden;}
.workout-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));}
.wh-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.wh-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.wh-meta{font-size:12px;color:var(--muted);margin-top:4px;}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;transition:border-color .2s;}
.ex-card:focus-within{border-color:var(--accent);}
.ex-card.superset{border-left:3px solid var(--warn);}
.ss-tag{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--warn);background:rgba(251,191,36,0.1);border-radius:4px;padding:2px 6px;display:inline-block;margin-bottom:8px;}
.ex-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px;}
.ex-prescription{font-size:12px;color:var(--accent2);margin-bottom:8px;}
.ex-last{font-size:11px;font-weight:600;color:var(--accent2);background:rgba(37,99,235,0.1);border:1px solid rgba(37,99,235,0.2);border-radius:6px;padding:5px 10px;display:inline-flex;align-items:center;gap:6px;margin-bottom:10px;}
.ex-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.input-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:13px 12px;text-align:center;outline:none;transition:all .2s;}
.input-wrap input:focus{border-color:var(--accent);background:var(--surface3);box-shadow:0 0 0 3px rgba(37,99,235,0.12);}
.input-wrap input:not(:placeholder-shown){color:var(--success) !important;-webkit-text-fill-color:var(--success) !important;}
.input-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:center;margin-top:4px;font-weight:600;}
.note-area{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:14px;resize:none;height:80px;outline:none;transition:border-color .2s;margin-bottom:14px;}
.note-area:focus{border-color:var(--accent);}
.log-btn{width:100%;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border:none;border-radius:var(--radius-sm);padding:17px;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 24px rgba(37,99,235,0.4);transition:all .2s;}
.log-btn:active{transform:scale(0.98);}
.log-btn:disabled{opacity:0.5;}
.rest-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 20px;text-align:center;}
.rest-emoji{font-size:40px;margin-bottom:12px;}
.rest-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:6px;}
.rest-sub{font-size:13px;color:var(--muted);}
.history-section{margin-top:28px;}
.section-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.hist-date{font-size:13px;font-weight:600;}
.hist-detail{font-size:11px;color:var(--muted);margin-top:2px;}
.success-overlay{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);pointer-events:none;}
.success-inner{display:flex;flex-direction:column;align-items:center;gap:16px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0;}
@keyframes popIn{0%{opacity:0;transform:scale(0.3)}70%{opacity:1;transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
.success-circle{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#34d399);display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 0 60px rgba(52,211,153,0.4);}
.success-word{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:3px;color:#fff;}
.success-sub{font-size:13px;color:rgba(52,211,153,0.8);letter-spacing:1px;}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;font-size:13px;font-weight:500;z-index:400;transition:transform .3s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.toast.show{transform:translateX(-50%) translateY(0);}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div>
      <div class="brand-name">Baymade Training</div>
      <div class="brand-tag">Client Portal</div>
    </div>
    <div>
      <div class="client-badge" id="clientName">—</div>
      <div class="client-level" id="clientLevel">—</div>
    </div>
  </div>
</div>
<main>
  <div id="appContent"><div class="loader"><div class="spinner"></div><div class="loader-text">Loading your workouts</div></div></div>
</main>
<div class="toast" id="toast"></div>
<script>
var SB_URL='https://oneykldgivaqcrqmrqha.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uZXlrbGRnaXZhcWNycW1ycWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTQ4NTYsImV4cCI6MjA5MzU3MDg1Nn0.Os-XjWM6nJuFOLLQhBUH0DUL40So-jkpXGx9iBequyw';
var CLIENT_ID='06acdc81-5f0b-4481-917a-d27baf89bc51';
var HDRS={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
var client=null,sessions=[],activeDay=null;

function sbGet(table,params){return fetch(SB_URL+’/rest/v1/’+table+’?’+params,{headers:HDRS}).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();});}
function sbPost(table,body){return fetch(SB_URL+’/rest/v1/’+table,{method:‘POST’,headers:HDRS,body:JSON.stringify(body)}).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();});}
function sbPatch(table,params,body){return fetch(SB_URL+’/rest/v1/’+table+’?’+params,{method:‘PATCH’,headers:HDRS,body:JSON.stringify(body)}).then(function(r){if(!r.ok)throw new Error(r.status);});}

function toast(msg){var t=document.getElementById(‘toast’);t.textContent=msg;t.classList.add(‘show’);setTimeout(function(){t.classList.remove(‘show’);},3000);}
function greeting(){var h=new Date().getHours();return h<12?‘Good morning’:h<17?‘Good afternoon’:‘Good evening’;}

function schedMap(){
var prog=client.structured_program;
if(!prog||!prog.days)return{};
var days=prog.days;
var sched=(client.schedule||’’).toLowerCase();
var dayMap={sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6,sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6};
var matched=[];
Object.keys(dayMap).forEach(function(k){if(sched.indexOf(k)>=0&&matched.indexOf(dayMap[k])<0)matched.push(dayMap[k]);});
matched.sort(function(a,b){return a-b;});
var map={};
matched.forEach(function(d,i){if(i<days.length)map[d]=i;});
return map;
}

function init(){
// Show error if nothing loads in 5 seconds
var timeout=setTimeout(function(){
document.getElementById(‘appContent’).innerHTML=’<div class="empty-state">Timeout — could not connect to database.<br><br>CLIENT_ID: ‘+CLIENT_ID.substring(0,8)+’…</div>’;
},5000);

sbGet(‘clients’,‘id=eq.’+CLIENT_ID).then(function(clients){
clearTimeout(timeout);
if(!clients||!clients.length){document.getElementById(‘appContent’).innerHTML=’<div class="empty-state">Profile not found.</div>’;return;}
client=clients[0];
return sbGet(‘sessions’,‘client_id=eq.’+CLIENT_ID+’&order=created_at.desc’).then(function(s){
sessions=s;
document.getElementById(‘clientName’).textContent=client.first+(client.last?’ ‘+client.last:’’);
document.getElementById(‘clientLevel’).textContent=(client.level||’’)+’ · ‘+(client.duration||60)+’ min’;
var todayIdx=new Date().getDay();
var sm=schedMap();
activeDay=sm[todayIdx]!==undefined?sm[todayIdx]:null;
render();
});
}).catch(function(e){
clearTimeout(timeout);
document.getElementById(‘appContent’).innerHTML=’<div class="empty-state">Error: ‘+e.message+’<br><br>Check network connection.</div>’;
});
}

function render(){
var prog=client.structured_program;
var days=prog?prog.days:[];
var sm=schedMap();
var today=new Date();
var todayIdx=today.getDay();
var dateStr=today.toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’,year:‘numeric’});
var todayLogged=sessions.some(function(s){return s.date===dateStr;});
var dayNames=[‘Su’,‘Mo’,‘Tu’,‘We’,‘Th’,‘Fr’,‘Sa’];
var startOfWeek=new Date(today);
startOfWeek.setDate(today.getDate()-today.getDay());

var weekStrip=’’;
for(var i=0;i<7;i++){
var d=new Date(startOfWeek);
d.setDate(startOfWeek.getDate()+i);
var dIdx=d.getDay();
var isToday=d.toDateString()===today.toDateString();
var hasWo=sm[dIdx]!==undefined;
var dStr=d.toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’,year:‘numeric’});
var isLogged=sessions.some(function(s){return s.date===dStr;});
var progDayIdx=sm[dIdx];
var cls=‘week-day’+(isToday&&activeDay!==null?’ active’:’’)+(hasWo&&!(isToday&&activeDay!==null)?’ has-workout’:’’)+(isLogged?’ logged’:’’);
var woName=hasWo&&days[progDayIdx]?days[progDayIdx].name.split(’ ‘)[0]:’’;
weekStrip+=’<div class="'+cls+'" onclick="selectDay('+(progDayIdx!==undefined?progDayIdx:'null')+')">’
+’<div class="wd-name">’+dayNames[dIdx]+’</div>’
+’<div class="wd-num">’+d.getDate()+’</div>’
+’<div class="wd-dot"></div>’
+(woName?’<div style="font-size:8px;color:rgba(100,160,255,0.6);margin-top:2px;text-align:center">’+woName+’</div>’:’’)
+’</div>’;
}

var workoutContent=’’;
if(activeDay===null){
workoutContent=’<div class="rest-card"><div class="rest-emoji">😴</div><div class="rest-title">Rest Day</div><div class="rest-sub">No workout scheduled today.<br>Recovery is part of the program!</div></div>’;
} else {
var day=days[activeDay];
var hist=client.exercise_history||{};
var exCards=day.exercises.map(function(ex,i){
var key=ex.name.toLowerCase().replace(/\s+/g,’_’);
var last=hist[key];
var isSS=/^SS/i.test(ex.name);
var name=ex.name.replace(/^SS\w+:\s*/i,’’);
return ‘<div class="ex-card'+(isSS?' superset':'')+'">’+
(isSS?’<span class="ss-tag">Superset</span>’:’’)+
‘<div class="ex-name">’+name+’</div>’+
‘<div class="ex-prescription">’+ex.prescription+(ex.load?’  ·  <span style="color:var(--muted)">’+ex.load+’</span>’:’’)+’</div>’+
(last?’<div class="ex-last">📊 Last: ‘+(last.reps||’—’)+’  ·  ‘+(last.weight||’—’)+’</div>’:’’)+
‘<div class="ex-inputs">’+
‘<div class="input-wrap"><input id="r'+i+'" placeholder="'+(last&&last.reps?last.reps:'Sets × Reps')+'"><div class="input-label">Sets × Reps</div></div>’+
‘<div class="input-wrap"><input id="w'+i+'" placeholder="'+(last&&last.weight?last.weight:'Weight / Load')+'"><div class="input-label">Weight / Load</div></div>’+
‘</div></div>’;
}).join(’’);
workoutContent=’<div class="workout-header"><div class="wh-label">Today's Workout</div><div class="wh-name">’+day.name+’</div><div class="wh-meta">’+day.exercises.length+’ exercises’+(todayLogged?’ · <span style="color:var(--success)">✓ Logged today</span>’:’’)+’</div></div>’+
exCards+
‘<textarea class="note-area" id="sessionNote" placeholder="Add a note (optional)..."></textarea>’+
‘<button class="log-btn" id="logBtn" onclick="logSession()">⚡  Log This Workout</button>’;
}

var histHtml=’’;
if(sessions.length>0){
histHtml=’<div class="history-section"><div class="section-title">Recent Sessions</div>’+
sessions.slice(0,5).map(function(s){
return ‘<div class="hist-item"><div><div class="hist-date">’+s.date+’</div>’+(s.workout&&s.workout.length?’<div class="hist-detail" style="color:var(--accent2)">’+s.workout.slice(0,3).map(function(w){return w.name.replace(/^SS\w+:\s*/i,’’);}).join(’ · ‘)+(s.workout.length>3?’ +’+(s.workout.length-3)+’ more’:’’)+’</div>’:’’)+’</div><span style="font-size:10px;color:var(--success);font-weight:700">✓ DONE</span></div>’;
}).join(’’)+’</div>’;
}

document.getElementById(‘appContent’).innerHTML=
‘<div class="greeting"><div class="greeting-label">Client Portal</div><div class="greeting-text">’+greeting()+’,<br>’+client.first+’ 👋</div><div class="greeting-sub">’+(activeDay!==null?‘Here's your workout for today.’:‘Rest up — no workout today.’)+’</div></div>’+
‘<div class="week-strip">’+weekStrip+’</div>’+
workoutContent+histHtml;
}

function selectDay(idx){if(idx===null||idx===undefined)return;activeDay=idx;render();}

function logSession(){
var btn=document.getElementById(‘logBtn’);
if(!btn)return;
btn.disabled=true;btn.textContent=‘Saving…’;
var day=client.structured_program.days[activeDay];
var dateStr=new Date().toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’,year:‘numeric’});
var note=document.getElementById(‘sessionNote’)?document.getElementById(‘sessionNote’).value.trim():’’;
var hist=Object.assign({},client.exercise_history||{});
var workout=[];
day.exercises.forEach(function(ex,i){
var r=document.getElementById(‘r’+i)?document.getElementById(‘r’+i).value.trim():’’;
var w=document.getElementById(‘w’+i)?document.getElementById(‘w’+i).value.trim():’’;
if(r||w){
var key=ex.name.toLowerCase().replace(/\s+/g,’_’);
hist[key]={reps:r,weight:w,date:dateStr};
workout.push({name:ex.name,reps:r,weight:w});
}
});
sbPost(‘sessions’,{client_id:CLIENT_ID,date:dateStr,note:note,workout:workout})
.then(function(){return sbPatch(‘clients’,‘id=eq.’+CLIENT_ID,{exercise_history:hist});})
.then(function(){
client.exercise_history=hist;
return sbGet(‘sessions’,‘client_id=eq.’+CLIENT_ID+’&order=created_at.desc’);
})
.then(function(s){
sessions=s;
var overlay=document.createElement(‘div’);
overlay.className=‘success-overlay’;
overlay.innerHTML=’<div class="success-inner"><div class="success-circle">⚡</div><div class="success-word">CRUSHED IT</div><div class="success-sub">Workout saved ✓</div></div>’;
document.body.appendChild(overlay);
setTimeout(function(){overlay.style.transition=‘opacity .4s’;overlay.style.opacity=‘0’;setTimeout(function(){overlay.remove();},400);},1400);
render();
})
.catch(function(e){
btn.disabled=false;btn.textContent=‘⚡  Log This Workout’;
toast(‘Error saving — check connection’);
});
}

init();
</script>

</body>
</html>
