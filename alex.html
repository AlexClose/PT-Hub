<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baymade Training</title>
<style>
body{background:#070910;color:#eef2fa;font-family:sans-serif;padding:20px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="main">
<div style="display:flex;align-items:center;justify-content:center;min-height:50vh">
<div style="width:36px;height:36px;border:3px solid rgba(120,160,255,0.18);border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite"></div>
</div>
</div>
<script>
var SB_URL='https://oneykldgivaqcrqmrqha.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uZXlrbGRnaXZhcWNycW1ycWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTQ4NTYsImV4cCI6MjA5MzU3MDg1Nn0.Os-XjWM6nJuFOLLQhBUH0DUL40So-jkpXGx9iBequyw';
var CLIENT_ID='06acdc81-5f0b-4481-917a-d27baf89bc51';
var cli=null,sess=[];

fetch(SB_URL+'/rest/v1/clients?id=eq.'+CLIENT_ID,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}})
.then(function(r){return r.json();})
.then(function(d){
cli=d[0];
return fetch(SB_URL+'/rest/v1/sessions?client_id=eq.'+CLIENT_ID+'&order=created_at.desc',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
})
.then(function(r){return r.json();})
.then(function(s){
sess=s;
document.getElementById('main').innerHTML='<p style="color:#34d399">Got client: '+cli.first+', sessions: '+sess.length+'</p>';
})
.catch(function(e){
document.getElementById('main').innerHTML='<p style="color:#f87171">Error: '+e.message+'</p>';
});
</script>
</body>
</html>
