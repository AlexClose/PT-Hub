<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baymade Training - Alex</title>
<style>
body{background:#0a0c0f;color:#fff;font-family:sans-serif;padding:20px;}
#status{font-size:18px;margin-bottom:20px;}
.ex{background:#141820;border-radius:10px;padding:14px;margin-bottom:10px;}
.ex-name{font-size:16px;font-weight:600;margin-bottom:4px;}
.ex-info{font-size:12px;color:#60a5fa;margin-bottom:10px;}
.inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
input{background:#1a1f28;border:1px solid rgba(100,160,255,0.2);border-radius:8px;color:#fff;font-size:15px;padding:10px;text-align:center;width:100%;}
input:not(:placeholder-shown){color:#43d9a2;}
.btn{width:100%;background:#2563eb;color:#fff;border:none;border-radius:10px;padding:16px;font-size:15px;font-weight:700;margin-top:16px;cursor:pointer;}
.tab{display:inline-block;padding:8px 16px;border-radius:20px;border:1px solid rgba(100,160,255,0.2);margin-right:8px;cursor:pointer;font-size:12px;}
.tab.active{background:#2563eb;border-color:#2563eb;}
</style>
</head>
<body>
<div style="font-size:11px;color:#60a5fa;letter-spacing:2px;margin-bottom:4px">BAYMADE TRAINING</div>
<div id="clientName" style="font-size:22px;font-weight:700;margin-bottom:4px">Loading...</div>
<div id="clientSub" style="font-size:12px;color:rgba(180,200,230,0.5);margin-bottom:20px"></div>
<div id="tabs" style="margin-bottom:16px;overflow-x:auto;white-space:nowrap"></div>
<div id="content"></div>

<script>
const URL='https://oneykldgivaqcrqmrqha.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uZXlrbGRnaXZhcWNycW1ycWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTQ4NTYsImV4cCI6MjA5MzU3MDg1Nn0.Os-XjWM6nJuFOLLQhBUH0DUL40So-jkpXGx9iBequyw';
const ID='06acdc81-5f0b-4481-917a-d27baf89bc51';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};

let client=null,sessions=[],day=0;

async function get(table,params){
  const r=await fetch(URL+'/rest/v1/'+table+'?'+params,{headers:H});
  return r.json();
}

async function post(table,body){
  const r=await fetch(URL+'/rest/v1/'+table,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(body)});
  return r.json();
}

async function patch(table,params,body){
  await fetch(URL+'/rest/v1/'+table+'?'+params,{method:'PATCH',headers:H,body:JSON.stringify(body)});
}

async function init(){
  try{
    const c=await get('clients','id=eq.'+ID);
    if(!c||!c.length){document.getElementById('clientName').textContent='Not found';return;}
    client=c[0];
    sessions=await get('sessions','client_id=eq.'+ID+'&order=created_at.desc');
    document.getElementById('clientName').textContent=client.first+' '+(client.last||'');
    document.getElementById('clientSub').textContent=(client.level||'')+' · '+(client.duration||60)+' min sessions';
    renderTabs();
    renderDay();
  }catch(e){
    document.getElementById('clientName').textContent='Error: '+e.message;
  }
}

function renderTabs(){
  const days=client.structured_program?.days||[];
  document.getElementById('tabs').innerHTML=days.map((d,i)=>
    `<span class="tab ${i===day?'active':''}" onclick="setDay(${i})">${d.name}</span>`
  ).join('');
}

function setDay(i){day=i;renderTabs();renderDay();}

function renderDay(){
  const days=client.structured_program?.days||[];
  if(!days.length){document.getElementById('content').innerHTML='<p>No program yet.</p>';return;}
  const d=days[day];
  const hist=client.exercise_history||{};
  document.getElementById('content').innerHTML=
    d.exercises.map((ex,i)=>{
      const key=ex.name.toLowerCase().replace(/\s+/g,'_');
      const last=hist[key];
      const name=ex.name.replace(/^SS\w+:\s*/i,'');
      const isss=ex.name.match(/^SS/i);
      return `<div class="ex" style="${isss?'border-left:3px solid #ffb347':''}">
        ${isss?'<div style="font-size:9px;color:#ffb347;letter-spacing:2px;margin-bottom:4px">SUPERSET</div>':''}
        <div class="ex-name">${name}</div>
        <div class="ex-info">${ex.prescription}${ex.load?' · '+ex.load:''}</div>
        ${last?`<div style="font-size:11px;color:#60a5fa;background:rgba(37,99,235,0.1);border-radius:6px;padding:4px 8px;display:inline-block;margin-bottom:8px">Last: ${last.reps||'—'} · ${last.weight||'—'}</div>`:''}
        <div class="inputs">
          <div><input id="r${i}" placeholder="Sets × Reps"></div>
          <div><input id="w${i}" placeholder="Weight / Load"></div>
        </div>
      </div>`;
    }).join('')+
    `<textarea id="note" placeholder="Session note (optional)" style="width:100%;background:#141820;border:1px solid rgba(100,160,255,0.2);border-radius:10px;color:#fff;padding:12px;margin-top:8px;height:70px;font-size:14px"></textarea>

```
<button class="btn" onclick="logIt()">⚡ Log Workout</button>`;
```

}

async function logIt(){
const btn=document.querySelector(’.btn’);
btn.textContent=‘Saving…’;btn.disabled=true;
const days=client.structured_program.days;
const d=days[day];
const date=new Date().toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’,year:‘numeric’});
const note=document.getElementById(‘note’)?.value||’’;
const hist={…(client.exercise_history||{})};
const workout=[];
d.exercises.forEach((ex,i)=>{
const r=document.getElementById(‘r’+i)?.value.trim();
const w=document.getElementById(‘w’+i)?.value.trim();
if(r||w){
const key=ex.name.toLowerCase().replace(/\s+/g,’_’);
hist[key]={reps:r||’’,weight:w||’’,date};
workout.push({name:ex.name,reps:r||’’,weight:w||’’});
}
});
try{
await post(‘sessions’,{client_id:ID,date,note,workout});
await patch(‘clients’,‘id=eq.’+ID,{exercise_history:hist});
client.exercise_history=hist;
sessions=await get(‘sessions’,‘client_id=eq.’+ID+’&order=created_at.desc’);
btn.textContent=‘✓ Logged!’;btn.style.background=’#43d9a2’;btn.style.color=’#000’;
setTimeout(()=>{btn.textContent=‘⚡ Log Workout’;btn.style.background=’#2563eb’;btn.style.color=’#fff’;btn.disabled=false;renderDay();},2000);
}catch(e){
btn.textContent=‘Error — try again’;btn.disabled=false;
}
}

init();
</script>

</body>
</html>
